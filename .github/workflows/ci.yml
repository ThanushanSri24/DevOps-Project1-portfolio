name: Full CI/CD Pipeline (Docker Simulation)

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Basic App Test
        run: |
          python -c "import app; print('App imports successfully')"

      - name: Build Docker Image
        run: |
          docker build -t devops-app .

      - name: Run Docker Container (CD Simulation)
        run: |
          docker run -d -p 5000:5000 --name test-app devops-app
          sleep 5
          docker ps

      - name: Check Container Logs
        run: |
          docker logs test-app